{% extends 'home/index.html' %}

{% block content %}
<h2>Confirm Delete</h2>

<p>Are you sure you want to delete {{ student.name }}?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, Delete</button>
    <a href="/" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
